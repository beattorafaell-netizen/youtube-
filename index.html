<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Scheduler</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --card: #16161f;
    --border: #ffffff0f;
    --red: #ff2d2d;
    --red-dim: #ff2d2d22;
    --text: #f0f0f5;
    --muted: #7070a0;
    --success: #00e676;
    --warning: #ffb300;
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* BG grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 48px;
    animation: fadeDown .5s ease both;
  }

  .logo {
    width: 44px; height: 44px;
    background: var(--red);
    border-radius: 12px;
    display: grid; place-items: center;
    flex-shrink: 0;
  }
  .logo svg { width: 22px; fill: white; }

  header h1 {
    font-family: 'Syne', sans-serif;
    font-size: 1.6rem;
    font-weight: 800;
    letter-spacing: -0.02em;
  }
  header h1 span { color: var(--red); }

  header p { color: var(--muted); font-size: .85rem; margin-top: 2px; }

  /* FORM CARD */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px;
    margin-bottom: 32px;
    animation: fadeUp .5s .1s ease both;
  }

  .card-title {
    font-family: 'Syne', sans-serif;
    font-size: .75rem;
    font-weight: 700;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 24px;
  }

  /* DROPZONE */
  .dropzone {
    border: 2px dashed var(--border);
    border-radius: 10px;
    padding: 40px 24px;
    text-align: center;
    cursor: pointer;
    transition: border-color .2s, background .2s;
    margin-bottom: 24px;
    position: relative;
  }
  .dropzone:hover, .dropzone.dragover {
    border-color: var(--red);
    background: var(--red-dim);
  }
  .dropzone input[type=file] {
    position: absolute; inset: 0;
    opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .dropzone-icon { font-size: 2.2rem; margin-bottom: 10px; }
  .dropzone p { color: var(--muted); font-size: .9rem; }
  .dropzone p strong { color: var(--text); }
  .dropzone .file-chosen {
    margin-top: 10px;
    font-size: .85rem;
    color: var(--success);
    font-weight: 500;
  }

  /* INPUTS GRID */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media(max-width:560px){ .grid-2 { grid-template-columns: 1fr; } }

  .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
  .field label {
    font-size: .78rem;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .08em;
  }
  .field input, .field textarea, .field select {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: .92rem;
    padding: 10px 14px;
    outline: none;
    transition: border-color .2s;
    width: 100%;
  }
  .field input:focus, .field textarea:focus, .field select:focus {
    border-color: var(--red);
  }
  .field textarea { resize: vertical; min-height: 80px; }
  .field select option { background: #1a1a2e; }

  /* BUTTON */
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--red);
    color: white;
    font-family: 'Syne', sans-serif;
    font-size: .9rem;
    font-weight: 700;
    letter-spacing: .04em;
    border: none;
    border-radius: 8px;
    padding: 12px 28px;
    cursor: pointer;
    transition: opacity .2s, transform .1s;
  }
  .btn:hover { opacity: .88; }
  .btn:active { transform: scale(.97); }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: .82rem;
    font-weight: 400;
    padding: 6px 14px;
  }
  .btn-outline:hover { border-color: var(--red); color: var(--red); opacity: 1; }

  /* QUEUE */
  .queue-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
    animation: fadeUp .5s .2s ease both;
  }
  .queue-header h2 {
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
  }
  .queue-count {
    background: var(--red-dim);
    color: var(--red);
    font-size: .75rem;
    font-weight: 700;
    border-radius: 20px;
    padding: 2px 10px;
  }

  .queue-empty {
    text-align: center;
    color: var(--muted);
    padding: 40px;
    font-size: .9rem;
    border: 1px dashed var(--border);
    border-radius: var(--radius);
    animation: fadeUp .5s .3s ease both;
  }

  .queue-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 16px;
    animation: fadeUp .3s ease both;
    transition: border-color .2s;
  }
  .queue-item:hover { border-color: #ffffff1a; }

  .qi-thumb {
    width: 52px; height: 52px;
    background: var(--surface);
    border-radius: 8px;
    display: grid; place-items: center;
    flex-shrink: 0;
    font-size: 1.4rem;
  }

  .qi-info { flex: 1; min-width: 0; }
  .qi-title {
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: .95rem;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .qi-meta { color: var(--muted); font-size: .78rem; margin-top: 4px; }

  .qi-status {
    font-size: .72rem;
    font-weight: 700;
    letter-spacing: .06em;
    text-transform: uppercase;
    border-radius: 20px;
    padding: 3px 10px;
    flex-shrink: 0;
  }
  .status-aguardando { background: #ffb30022; color: var(--warning); }
  .status-enviando   { background: #2979ff22; color: #2979ff; }
  .status-enviado    { background: #00e67622; color: var(--success); }
  .status-erro       { background: var(--red-dim); color: var(--red); }
  .status-cancelado  { background: #ffffff11; color: var(--muted); }

  .qi-actions { flex-shrink: 0; }

  /* TOAST */
  #toast {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 22px;
    font-size: .88rem;
    opacity: 0;
    transition: opacity .3s, transform .3s;
    z-index: 999;
    pointer-events: none;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast.success { border-color: var(--success); color: var(--success); }
  #toast.error   { border-color: var(--red);     color: var(--red);     }

  /* ANIMATIONS */
  @keyframes fadeDown { from { opacity:0; transform:translateY(-16px); } to { opacity:1; transform:none; } }
  @keyframes fadeUp   { from { opacity:0; transform:translateY(16px);  } to { opacity:1; transform:none; } }

  .spinner {
    width: 14px; height: 14px;
    border: 2px solid #ffffff44;
    border-top-color: white;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="wrapper">

  <!-- HEADER -->
  <header>
    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M23.5 6.2s-.3-2-1.2-2.8c-1.1-1.2-2.4-1.2-3-1.3C16.8 2 12 2 12 2s-4.8 0-7.3.1c-.6.1-1.9.1-3 1.3C.8 4.2.5 6.2.5 6.2S.2 8.5.2 10.8v2.1c0 2.3.3 4.6.3 4.6s.3 2 1.2 2.8c1.1 1.2 2.6 1.1 3.3 1.2C7 21.7 12 21.8 12 21.8s4.8 0 7.3-.2c.6-.1 1.9-.1 3-1.3.9-.8 1.2-2.8 1.2-2.8s.3-2.3.3-4.6v-2.1c0-2.3-.3-4.6-.3-4.6zM9.7 15.5V8.4l8.1 3.6-8.1 3.5z"/></svg>
    </div>
    <div>
      <h1>YouTube <span>Scheduler</span></h1>
      <p>Agende uploads automáticos para o seu canal</p>
    </div>
  </header>

  <!-- FORM -->
  <div class="card">
    <div class="card-title">📹 Novo agendamento</div>

    <div class="dropzone" id="dropzone">
      <input type="file" id="fileInput" accept="video/*">
      <div class="dropzone-icon">🎬</div>
      <p><strong>Clique ou arraste</strong> seu vídeo aqui</p>
      <p>MP4, AVI, MOV, MKV, WEBM</p>
      <div class="file-chosen" id="fileChosen"></div>
    </div>

    <div class="grid-2">
      <div class="field">
        <label>Título</label>
        <input type="text" id="titulo" placeholder="Nome do vídeo">
      </div>
      <div class="field">
        <label>Agendamento</label>
        <input type="datetime-local" id="horario">
      </div>
    </div>

    <div class="field">
      <label>Descrição</label>
      <textarea id="descricao" placeholder="Descrição do vídeo (opcional)"></textarea>
    </div>

    <div class="field" style="margin-bottom:24px">
      <label>Privacidade</label>
      <select id="privacidade">
        <option value="public">🌍 Público</option>
        <option value="unlisted">🔗 Não listado</option>
        <option value="private">🔒 Privado</option>
      </select>
    </div>

    <button class="btn" id="btnAgendar" onclick="agendar()">
      <span>Agendar upload</span>
    </button>
  </div>

  <!-- QUEUE -->
  <div class="queue-header">
    <h2>Fila de envios</h2>
    <span class="queue-count" id="queueCount">0</span>
  </div>
  <div id="queueList"></div>

</div>

<div id="toast"></div>

<script>
  // Define horário padrão como agora
  const now = new Date();
  now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
  document.getElementById('horario').value = now.toISOString().slice(0,16);

  // Dropzone
  const dropzone = document.getElementById('dropzone');
  const fileInput = document.getElementById('fileInput');
  const fileChosen = document.getElementById('fileChosen');

  dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('dragover'); });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
  dropzone.addEventListener('drop', e => {
    e.preventDefault();
    dropzone.classList.remove('dragover');
    fileInput.files = e.dataTransfer.files;
    onFileChange();
  });
  fileInput.addEventListener('change', onFileChange);

  function onFileChange() {
    const f = fileInput.files[0];
    if (!f) return;
    fileChosen.textContent = '✓ ' + f.name;
    if (!document.getElementById('titulo').value)
      document.getElementById('titulo').value = f.name.replace(/\.[^/.]+$/, '');
  }

  // Agendar
  async function agendar() {
    const file = fileInput.files[0];
    if (!file) { toast('Selecione um vídeo!', 'error'); return; }

    const titulo = document.getElementById('titulo').value || file.name;
    const horario = document.getElementById('horario').value;
    const descricao = document.getElementById('descricao').value;
    const privacidade = document.getElementById('privacidade').value;

    const btn = document.getElementById('btnAgendar');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Enviando...';

    const fd = new FormData();
    fd.append('video', file);
    fd.append('titulo', titulo);
    fd.append('horario', horario);
    fd.append('descricao', descricao);
    fd.append('privacidade', privacidade);

    try {
      const res = await fetch('/agendar', { method: 'POST', body: fd });
      const data = await res.json();
      if (data.ok) {
        toast('✅ Agendado com sucesso!', 'success');
        fileInput.value = '';
        fileChosen.textContent = '';
        document.getElementById('titulo').value = '';
        document.getElementById('descricao').value = '';
        carregarFila();
      } else {
        toast('Erro: ' + data.erro, 'error');
      }
    } catch(e) {
      toast('Falha na conexão com o servidor', 'error');
    }

    btn.disabled = false;
    btn.innerHTML = '<span>Agendar upload</span>';
  }

  // Cancelar
  async function cancelar(id) {
    const res = await fetch('/cancelar/' + id, { method: 'DELETE' });
    const data = await res.json();
    if (data.ok) { toast('Cancelado.', 'success'); carregarFila(); }
    else toast('Não foi possível cancelar.', 'error');
  }

  // Carregar fila
  async function carregarFila() {
    try {
      const res = await fetch('/fila');
      const fila = await res.json();
      renderFila(fila);
    } catch(e) {}
  }

  function renderFila(fila) {
    const container = document.getElementById('queueList');
    const count = document.getElementById('queueCount');
    count.textContent = fila.length;

    if (!fila.length) {
      container.innerHTML = '<div class="queue-empty">Nenhum vídeo agendado ainda.<br>Adicione um acima! 👆</div>';
      return;
    }

    const statusLabel = { aguardando: 'Aguardando', enviando: 'Enviando...', enviado: 'Enviado', erro: 'Erro', cancelado: 'Cancelado' };
    const emojis = ['🎬','📽️','🎥','🎞️','📹'];

    container.innerHTML = [...fila].reverse().map((item, i) => `
      <div class="queue-item">
        <div class="qi-thumb">${emojis[i % emojis.length]}</div>
        <div class="qi-info">
          <div class="qi-title">${esc(item.titulo)}</div>
          <div class="qi-meta">
            📅 ${new Date(item.horario).toLocaleString('pt-BR')} &nbsp;·&nbsp;
            ${item.privacidade === 'public' ? '🌍 Público' : item.privacidade === 'unlisted' ? '🔗 Não listado' : '🔒 Privado'}
            ${item.url ? ` &nbsp;·&nbsp; <a href="${item.url}" target="_blank" style="color:var(--success)">Ver no YouTube ↗</a>` : ''}
            ${item.erro ? ` &nbsp;·&nbsp; <span style="color:var(--red)">${esc(item.erro)}</span>` : ''}
          </div>
        </div>
        <span class="qi-status status-${item.status}">${statusLabel[item.status] || item.status}</span>
        <div class="qi-actions">
          ${item.status === 'aguardando' ? `<button class="btn btn-outline" onclick="cancelar(${item.id})">Cancelar</button>` : ''}
        </div>
      </div>
    `).join('');
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // Toast
  let toastTimer;
  function toast(msg, type='success') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'show ' + type;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.className = '', 3000);
  }

  // Polling a cada 5s
  carregarFila();
  setInterval(carregarFila, 5000);
</script>
</body>
</html>
